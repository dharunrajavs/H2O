# Ingress for REST API and WebSocket.
# TCP/GT06 uses the h2o-tcp LoadBalancer Service directly (not Ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: h2o-ingress
  namespace: h2o
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"       # WebSocket keep-alive
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # WebSocket upgrade
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # TLS — managed by cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.h2o-gps.example.com
      secretName: h2o-tls
  rules:
    - host: api.h2o-gps.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: h2o-api
                port:
                  number: 8081
