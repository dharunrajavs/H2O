global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "h2o-server"
    static_configs:
      - targets: ["h2o:8081"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
