version: "3.9"

# H2O GPS Platform — Monolith Docker Compose
# ONE application container runs everything: TCP gateway + API + workers.
# Scale it by adding replicas: docker-compose up --scale h2o=3

networks:
  h2o-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: h2o-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: h2o_gps
      POSTGRES_USER: h2o
      POSTGRES_PASSWORD: h2oSecure2024!
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./internal/storage/postgres/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    networks:
      - h2o-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h2o -d h2o_gps"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: h2o-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - h2o-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Monolith Application (single binary, all modules) ───────────────────────

  h2o:
    build:
      context: .
      dockerfile: Dockerfile
    image: h2o-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"   # GT06 TCP — GPS devices connect here
      - "8081:8081"   # REST + WebSocket API
    environment:
      APP_ENVIRONMENT: development
      APP_LOG_LEVEL: info

      # TCP gateway
      TCP_HOST: "0.0.0.0"
      TCP_PORT: "8080"
      TCP_MAX_CONNECTIONS: "10000"
      TCP_IDLE_TIMEOUT: "180s"
      TCP_KEEPALIVE: "30s"

      # API server
      SERVER_API_HOST: "0.0.0.0"
      SERVER_API_PORT: "8081"

      # Database
      POSTGRES_DSN: "postgresql://h2o:h2oSecure2024!@postgres:5432/h2o_gps?sslmode=disable"
      POSTGRES_MAX_OPEN_CONNS: "50"

      # Redis (live position cache + cross-instance WS fanout)
      REDIS_ADDRS: "redis:6379"
      REDIS_POOL_SIZE: "20"

      # JWT secrets — CHANGE THESE IN PRODUCTION
      JWT_ACCESS_SECRET: "CHANGE_ME_256bit_secret_here"
      JWT_REFRESH_SECRET: "CHANGE_ME_refresh_secret_here"
      JWT_ACCESS_TTL: "15m"
      JWT_REFRESH_TTL: "168h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - h2o-net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "2G"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Frontend ────────────────────────────────────────────────────────────────

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: h2o-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8081"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8081/ws"
    networks:
      - h2o-net
    depends_on:
      - h2o

  # ─── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: h2o-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - h2o-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: h2o-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - h2o-net
    depends_on:
      - prometheus
